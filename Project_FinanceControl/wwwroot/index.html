<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <h2>Login</h2>

    <form action="/login">
        <label for="user">User:</label><br>
        <input type="text" id="user-name" name="user-name" value=""><br>
        <label for="password">Password:</label><br>
        <input type="text" id="password" name="password" value=""><br><br>
        <input type="submit" value="Submit">
    </form>

    <p>If you click the "Submit" button, the form-data will be sent to a page called "/login.cs".</p>
    <p>Se voce clicar no botão "Submit", os dados do formulario serão enviados a pagina "/login.cs".</p> --configurar para bater na rota login.cs(validando dados do usuarios)
</body>
</html>
